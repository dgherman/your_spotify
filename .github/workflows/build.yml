---
name: Build & Push Docker Images

on:
  push:
    branches:
      - master
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "server_tags=ghcr.io/${REPO_LOWER}_server:latest,ghcr.io/${REPO_LOWER}_server:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "client_tags=ghcr.io/${REPO_LOWER}_client:latest,ghcr.io/${REPO_LOWER}_client:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH=$(echo "${GITHUB_REF#refs/heads/}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "server_tags=ghcr.io/${REPO_LOWER}_server:${BRANCH},ghcr.io/${REPO_LOWER}_server:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "client_tags=ghcr.io/${REPO_LOWER}_client:${BRANCH},ghcr.io/${REPO_LOWER}_client:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.server_tags }}

      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.client.production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.client_tags }}
